<!doctype html>
<html lang="hr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prijava</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- Sekcija 1 — Hero s infoboksevima -->
    <section class="bg-dark bg-gradient text-white py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-lg-9 col-xl-8 text-center mb-4">
            <h1 class="mb-2">Radionica: Prijava</h1>
            <p class="lead mb-0 text-white-50">Prijavi se i osiguraj svoje mjesto.</p>
          </div>
        </div>

        <div class="row g-3">
          <div class="col-12 col-md-4">
            <div class="text-bg-secondary rounded-3 p-3 h-100">
              <div class="d-flex align-items-start gap-3">
                <div class="fs-2 lh-1 d-inline-flex align-items-center justify-content-center rounded-circle bg-black bg-opacity-25 p-2" aria-hidden="true">
                  📅
                </div>
                <div>
                  <h3 class="h5 mb-1">Datum</h3>
                  <p class="mb-0 opacity-75">Subota, 28. 3. 2026. u 10:00</p>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <div class="text-bg-secondary rounded-3 p-3 h-100">
              <div class="d-flex align-items-start gap-3">
                <div class="fs-2 lh-1 d-inline-flex align-items-center justify-content-center rounded-circle bg-black bg-opacity-25 p-2" aria-hidden="true">
                  📍
                </div>
                <div>
                  <h3 class="h5 mb-1">Lokacija</h3>
                  <p class="mb-0 opacity-75">Zagreb, centar — dvorana A</p>
                </div>
              </div>
            </div>
          </div>

          <div class="col-12 col-md-4">
            <div class="text-bg-secondary rounded-3 p-3 h-100">
              <div class="d-flex align-items-start gap-3">
                <div class="fs-2 lh-1 d-inline-flex align-items-center justify-content-center rounded-circle bg-black bg-opacity-25 p-2" aria-hidden="true">
                  💰
                </div>
                <div>
                  <h3 class="h5 mb-1">Cijena</h3>
                  <p class="mb-0 opacity-75">Besplatno (broj mjesta ograničen)</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Sekcija 2 — Forma za prijavu -->
    <section class="bg-white py-5">
      <div class="container">
        <div class="row">
          <div class="col-12 col-lg-8 mx-auto">
            <div class="text-center mb-4">
              <h2 class="mb-2">Forma za prijavu</h2>
              <p class="text-body-secondary mb-0">Ispuni podatke i pošalji prijavu.</p>
            </div>

            <form class="needs-validation" novalidate>
              <div class="row g-3">
                <!-- BONUS: Na md+ ekranima Ime i Prezime u isti red -->
                <div class="col-12 col-md-6">
                  <label for="firstName" class="form-label">Ime</label>
                  <input
                    type="text"
                    class="form-control is-invalid"
                    id="firstName"
                    name="firstName"
                    placeholder="npr. Ana"
                    required
                  />
                  <div class="invalid-feedback">Unesi ispravno ime (min. 2 znaka).</div>
                </div>

                <div class="col-12 col-md-6">
                  <label for="lastName" class="form-label">Prezime</label>
                  <input
                    type="text"
                    class="form-control"
                    id="lastName"
                    name="lastName"
                    placeholder="npr. Horvat"
                    required
                  />
                </div>

                <div class="col-12">
                  <label for="email" class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    placeholder="ana@example.com"
                    required
                  />
                </div>

                <div class="col-12">
                  <label for="phone" class="form-label">Telefon</label>
                  <input
                    type="tel"
                    class="form-control"
                    id="phone"
                    name="phone"
                    placeholder="+385 91 234 5678"
                  />
                  <div class="form-text">Telefon nije obavezan.</div>
                </div>

                <div class="col-12">
                  <label for="level" class="form-label">Razina znanja</label>
                  <select class="form-select" id="level" name="level" required>
                    <option value="" selected disabled>Odaberi razinu</option>
                    <option value="pocetnik">Početnik</option>
                    <option value="srednji">Srednji</option>
                    <option value="napredni">Napredni</option>
                  </select>
                </div>

                <div class="col-12">
                  <label for="reason" class="form-label">Zašto se prijavljuješ?</label>
                  <textarea
                    class="form-control"
                    id="reason"
                    name="reason"
                    rows="3"
                    placeholder="Napiši kratko..."
                    required
                  ></textarea>
                </div>

                <div class="col-12">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="1" id="terms" required />
                    <label class="form-check-label" for="terms">Prihvaćam uvjete</label>
                  </div>
                </div>

                <div class="col-12 pt-2">
                  <button type="submit" class="btn btn-primary w-100">Pošalji prijavu</button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
